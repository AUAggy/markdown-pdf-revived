name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
      - run: npm audit --omit=dev
      - name: Run extension integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration
      - name: Run extension integration tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
      - name: Run installed VSIX package tests
        if: runner.os != 'Linux'
        run: npm run test:package
      - name: Run installed VSIX package tests on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:package
      - uses: actions/upload-artifact@v4
        with:
          name: package-evidence-${{ runner.os }}
          path: work/release/
